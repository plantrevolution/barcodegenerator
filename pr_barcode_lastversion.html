// ── PDF — text-based, Türkçe destekli (Roboto font) ──
async function downloadPDF(items,setGen){
  setGen(true);
  try{
    const{jsPDF}=window.jspdf;
    const t=new Date(),ds=t.getFullYear()+String(t.getMonth()+1).padStart(2,'0')+String(t.getDate()).padStart(2,'0');
    // Roboto Latin (ğşıüöç dahil) — Google Fonts CDN
    const res=await fetch("https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Mu4mxP.ttf");
    if(!res.ok)throw new Error("Font yüklenemedi");
    const buf=await res.arrayBuffer();
    const bytes=new Uint8Array(buf);
    let bin="";const ch=8192;
    for(let i=0;i<bytes.length;i+=ch)bin+=String.fromCharCode(...bytes.subarray(i,i+ch));
    const b64=btoa(bin);
    const doc=new jsPDF({unit:"mm",format:"a4"});
    doc.addFileToVFS("Roboto.ttf",b64);
    doc.addFont("Roboto.ttf","Roboto","normal");
    doc.setFont("Roboto");
    doc.setFontSize(8);doc.setTextColor(150,150,150);
    doc.text("Prev Barkod Yönetimi \u2014 "+items.length+" kayıt \u2014 "+ds,14,10);
    doc.autoTable({
      head:[["Ürün Başlığı","Beden","Barkod"]],
      body:items.map(b=>[b.title||"",b.s||"",b.barcode||""]),
      startY:14,
      styles:{font:"Roboto",fontSize:9,textColor:[0,0,0],cellPadding:{top:3,right:5,bottom:3,left:5}},
      headStyles:{fillColor:[15,15,15],textColor:[255,255,255],font:"Roboto",fontStyle:"normal",fontSize:9},
      alternateRowStyles:{fillColor:[248,248,248]},
      columnStyles:{
        0:{cellWidth:"auto"},
        1:{cellWidth:22,halign:"center"},
        2:{cellWidth:68,font:"courier",fontSize:8}
      },
      margin:{top:14,left:14,right:14,bottom:14}
    });
    doc.save("Prev_BarkodYönetimi_"+ds+".pdf");
  }catch(e){console.error(e);alert("PDF oluşturulamadı: "+e.message);}
  setGen(false);
}
